payload: '{"finding": "`arai why \"git status\"` is itself blocked by the rule it''s trying to diagnose. The PreToolUse hook fires on the bash command containing the substring ''git'' in the argument to `arai why`, before arai''s own dry-run can execute. This means arai''s diagnostic explainer cannot be used on commands that trip the rule — the very class of commands you most want to explain.", "rule_id": "manual://arai-add/c16936ed", "match_percentage": "50%", "version_checked": "arai 0.2.14 (latest released, source matches)", "candidate_fixes": ["arai why should be exempt from the PreToolUse evaluation against its OWN argument (it''s a dry-run, not an execution)", "or: arai why should always run advisory regardless of ARAI_DENY_MODE", "or: the matcher should distinguish ''this command will run X'' from ''this command mentions X as data''"], "severity": "high — blocks self-diagnosis of false positives, the exact UX the maintainer most needs"}'
