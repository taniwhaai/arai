description: |
  Subprocess-based integration test suite for the extends-pinning-signing-tiering
  composition (directive tokenisation → fetch-verification → tier-provenance).
  Exercises the full resolve() pipeline through the arai binary's discovery and
  scan subsystem. No network calls; all content seeded into the cache directly.

source_paths:
  - path: tests/extends_integration.rs
    kind: integration_test
    note: |
      11 subprocess-based integration tests driving arai scan via the binary.
      Tests cover all acceptance criteria scenarios:
      - AC1: Bare directive + legacy trust file → backward-compatible
      - AC2: Pin matching → admission
      - AC3: Pin mismatch → rejection with local preserved
      - AC4: Missing signature sidecar → rejection
      - AC9: tier=strict → upstream not shadowed
      - AC10: tier=advisory → upstream deprioritised
      - AC11a: tier=override with matching SPO → upstream dropped
      - AC11b: tier=override with no matching SPO → upstream retained
      - Per-directive failure isolation (two directives, one fails)
      - Wiring order: tokenisation before verification
      - Wiring order: verification before provenance
      Each test creates a fresh temp project with .git, seeds the cache with
      upstream content, adds entries to the trust file, writes a CLAUDE.md with
      arai:extends directives, runs `arai scan` from the project directory, and
      validates that the scan succeeds (upstream content was resolved and rules
      extracted).

deleted_paths:
  - path: src/lib.rs
    kind: code
    reason: Composition test uses subprocess pattern (binary), not library target
  - dependency: tempfile
    from: Cargo.toml [dev-dependencies]
    reason: Subprocess tests manage temp directories manually; no tempfile crate needed

