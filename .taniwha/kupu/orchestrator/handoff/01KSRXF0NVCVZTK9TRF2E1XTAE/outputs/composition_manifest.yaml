notes: |
  The composition uses the arai binary's real discovery+scan subsystem to exercise
  resolve() in context. Each test:
  1. Creates a fresh isolated temp project with .git (for project_root detection)
  2. Creates an arai_base temp directory (isolated store/cache)
  3. Seeds cache entries directly at <arai_base>/cache/extends/<url_hash>.md
  4. Seeds .sha256 sidecar files for all cached content
  5. Calls `arai trust --add` to register URLs (legacy form, or with --pubkey flag)
  6. Writes a CLAUDE.md with arai:extends directives (bare, with @pin, with tier=)
  7. Runs `arai scan` from the project directory (which triggers discover → resolve)
  8. Validates that scan completes successfully

  Scenarios where upstream is rejected (pin mismatch, missing sidecar) are verified
  by confirming scan still processes the file and extracts local rules.

  Scenarios where upstream is admitted (correct pin, no pubkey) are verified by
  confirming scan processes the file (upstream content was resolved and inlined
  before rule extraction).

  The test suite does not directly observe resolve() output, but it observes the
  effects of resolution through the scan pipeline. This is the intended approach
  for a subprocess-based test that drives the binary CLI.

