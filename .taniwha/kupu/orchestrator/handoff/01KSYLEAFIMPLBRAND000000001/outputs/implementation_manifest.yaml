module: brand-palette-styling
contract_version: 1
committed: false

files_created:
  - path: src/style.rs
    description: >
      Palette constants (pounamu RGB(31,77,63), ochre RGB(184,118,58));
      Stream enum; should_colorize gate with NO_COLOR > CLICOLOR_FORCE > IsTerminal
      precedence; five closed-set semantic helpers: structural, passage, dim, warn,
      error; #[cfg(test)] gate-matrix unit tests.
  - path: tests/style_integration.rs
    description: >
      Subprocess integration tests: 12 tests covering AC2 (NO_COLOR=1),
      AC3 (piped output), AC4 (--json paths), AC8 (guardrails --match-stdin).
      Uses env!("CARGO_BIN_EXE_arai") and ARAI_BASE_DIR temp isolation.
      No new dependencies.

files_modified:
  - path: src/main.rs
    description: >
      Added `mod style;`. Applied style helpers to cmd_status (structural headers),
      cmd_guardrails human listing (passage for rule lines), cmd_why human rendering
      (structural labels, passage for matched rules), audit table view (structural
      header, passage for row lines), and eprintln! "arai: {e}" error path (error
      helper on stderr). All --json branches left untouched.
  - path: src/stats.rs
    description: >
      Added `use crate::style;`. Applied structural to section headers (print_table,
      print_section titles, print_compliance_section, print_token_economics). Applied
      passage to per-rule compliance row lines in print_compliance_section.
      All json branch and compute() paths untouched.

files_untouched:
  - path: src/hooks.rs
    reason: "Deliberate carve-out (AC8): hook-protocol JSON must remain byte-identical."
  - path: src/guardrails.rs
    reason: >
      format_trace is only called from format_context which builds machine-consumed
      additionalContext. No human-facing rendering path uses format_trace, so no
      changes required.
  - path: src/audit.rs
    reason: >
      audit.rs contains only JSONL write logic and query helpers. Human-facing audit
      table rendering is in main.rs cmd_audit, which was modified.

