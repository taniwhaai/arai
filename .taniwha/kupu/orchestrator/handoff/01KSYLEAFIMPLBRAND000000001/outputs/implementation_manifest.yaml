acceptance_criteria_summary:
  AC1: >
    All ANSI escape construction and palette RGB values are centralised in
    src/style.rs only. No other source file embeds RGB triples or hand-rolls
    ANSI escapes.
  AC2: >
    should_colorize returns false when NO_COLOR is set (rule 1 dominates).
    Unit tests: ac2_no_color_gate_is_off, ac2_no_color_dominates_clicolor_force,
    ac2_no_color_helpers_return_plain. Integration tests: ac2_no_color_status_no_ansi,
    ac2_no_color_guardrails_no_ansi, ac2_no_color_hook_match_stdin_no_ansi.
  AC3: >
    When streams are piped (non-TTY) and neither NO_COLOR nor CLICOLOR_FORCE is set,
    should_colorize returns false and helpers return plain. Unit: ac3_non_tty_helpers_return_plain.
    Integration: ac3_piped_status_no_ansi, ac3_piped_guardrails_no_ansi.
  AC4: >
    All --json branches are not routed through style helpers. Integration tests
    ac4_guardrails_json_has_no_ansi, ac4_stats_json_has_no_ansi, ac4_audit_json_has_no_ansi,
    ac4_why_json_has_no_ansi, ac4_lint_json_has_no_ansi all pass.
  AC5: >
    Structural helpers applied to section headers and labels; passage helpers applied
    to rule-firing lines (guardrails list, why matches, audit rows, compliance rows).
    Error/warn helpers applied to stderr "arai: ..." error path.
  AC6: >
    Closed five-helper set. No green or red escapes. Unit tests: ac6_no_stoplight_warn_and_error_use_ochre,
    error_emits_ochre_bold_same_as_warn.
  AC7: >
    Foreground-only; no background escape in any helper. Unit test: ac7_no_background_escape_in_any_helper.
  AC8: >
    src/hooks.rs not modified. Integration tests ac8_hook_match_stdin_no_ansi and
    ac8_hook_match_stdin_json_string_fields_no_ansi verify zero ANSI bytes.
  AC9: >
    Manual criterion (visual inspection on dark/light terminals). Pounamu and ochre
    are mid-range foreground-only colours that remain legible on both backgrounds.
  AC10: >
    cargo fmt --all, cargo clippy --all-targets (no new warnings), cargo test all pass.

prose_summary: >
  Implemented the brand-palette-styling module (src/style.rs) with the two brand
  foreground colours (pounamu RGB(31,77,63) and ochre RGB(184,118,58)), a
  should_colorize gate enforcing NO_COLOR > CLICOLOR_FORCE > IsTerminal precedence,
  and the closed five-helper set (structural, passage, dim, warn, error) using
  24-bit truecolor escapes with reset-after-span discipline. Applied the helpers
  to human-readable output in src/main.rs (status, guardrails listing, why, audit
  table, error path) and src/stats.rs (section headers, compliance rows). src/hooks.rs
  was not modified per AC8. All --json paths are untouched. The integration test
  suite verifies zero ANSI bytes in --json, piped, NO_COLOR=1, and hook-stdin
  output. Full gate (fmt + clippy + test) passes with 506 tests, 0 failures, and
  no new clippy warnings.
