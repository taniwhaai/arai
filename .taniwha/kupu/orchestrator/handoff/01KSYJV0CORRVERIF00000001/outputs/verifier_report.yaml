  overall: pass

  findings:
    - kind: other
      summary: "Implementation manifest contrast claim is a slight over-statement for white background"
      details: |
        The implementation manifest states contrast_ratio_on_white: "~4.6:1"
        for the new pounamu RGB(61,130,104). Verifier-computed WCAG 2.1
        math gives approximately 4.2:1 on white (#fff), which is below the
        WCAG AA 4.5:1 threshold for normal text.

        On dark (black) background the new pounamu gives approximately 5.0:1,
        which passes WCAG AA. The corrective amendment is a genuine improvement
        (old value was ~2.3:1 on black, failing WCAG AA).

        This is not an implementation bug — the contract's AC9 specifies
        human visual inspection rather than a specific numeric threshold, and
        the new colour is visibly more legible than the old on both common
        terminal backgrounds. The finding is surfaced for completeness so the
        team can decide whether a further tweak for white-terminal WCAG AA
        compliance is warranted.

    - kind: other
      summary: "AC4 stderr note — not a violation (carry-forward from prior report)"
      details: |
        When a --json command fails and CLICOLOR_FORCE=1 is set, the error
        message on stderr contains ANSI colour bytes from style::error().
        This is correct behaviour: the human-readable error notification on
        stderr is intentionally coloured per AC5. AC4 specifies only standard
        output must be ESC-free.

