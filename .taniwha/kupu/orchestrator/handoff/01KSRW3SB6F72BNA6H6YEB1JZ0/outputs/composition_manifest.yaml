wiring_verification: |
  The composition wiring is complete and correct. Evidence:

  1. Tokenisation step: extract_directives() in src/extends.rs calls
     classify_directive() to parse each directive line into a ParsedDirective
     or MalformedDirective. (Lines 941-952, 1045.)

  2. Trust entry lookup: fetch() (line 725) calls is_trusted() and
     find_trust_entry() to resolve the TrustEntry for each URL before
     attempting to fetch content. (Lines 727-733.)

  3. Verification step: fetch() calls verify_content() on both the cached
     path (line 742) and the fresh-remote path (line 758), passing the
     obtained content, the pin from the ParsedDirective, and the resolved
     TrustEntry. verify_content() performs pin comparison and signature
     checks as specified in the fetch-verification contract.

  4. Provenance tagging: resolve() (line 1044) emits the tier-annotated
     block-start comment (line 1063-1064) before inlining upstream content.
     The tier value comes from ParsedDirective.tier, defaulting to "peer"
     when absent (lines 1057-1062). No new code path is entered when tier
     is absent (AC1 backward-compat).

  5. Downstream: The inlined + provenance-tagged content passes to the
     existing parser/store/guardrails pipeline. The parser's
     extract_rules_from_resolved() function (parser.rs, lines 182-245)
     reads the block-start markers and applies per-block provenance to each
     rule triple.

  Error semantics are honoured:
  - MalformedDirective from tokenisation (classify_directive) is caught by
    resolve() and logged to stderr; processing continues (line 1072-1074).
  - Reject from fetch-verification (verify_content returning Err) is caught
    by fetch() and logged to stderr; resolve() treats it as a failed fetch
    and skips the upstream block (line 742-744, 758-762, 1072-1074).
  - Trust-file deserialisaton happens at the start of resolve() via
    read_trust() calls (no error handling — the file is not mission-critical
    and reads default to empty on any error, per line 336-338). On-disk
    trust errors do not propagate to the caller; they are silently replaced
    with an empty trust file. This is the existing behavior and is unchanged.

  Backward-compatibility invariants are verified:
  - Tokeniser half (AC1): A directive with no trailing tokens produces a
    ParsedDirective with pin=None and tier=None. The code does not enter
    a new verify-content branch when pin is absent (lines 1052, and
    verify_content checks at line 479-480). Test case test_ac1 confirms
    this.
  - Trust-file half (AC7-AC8): The TrustFile dual-form deserialiser maps
    legacy list-of-strings to TrustEntry with pubkey=None. When pubkey is
    absent, verify_content skips signature checking (line 500) and only
    checks the pin if present. With no pin and no pubkey, verify_content
    returns Ok(true) immediately (line 492), producing byte-identical
    behavior to the pre-slice code. Test case test_ac1 confirms this.

  Behavioral guarantees are honoured:
  - Ordering: Step 1 precedes Step 3 (tokenise before verify). Step 3
    precedes Step 4 (verify before provenance/inline). The resolve()
    function processes directives in order; each calls fetch() (which
    calls verify_content()); then the result is inlined with the
    tier-annotated marker (lines 1050-1079).
  - Atomicity per directive: Each directive in the loop is either fully
    admitted (all steps succeed) or fully skipped (any failure returns
    Err and skips to next directive). No partial inline.
  - Idempotency: Given the same content and trust file, resolve() produces
    the same output (no state accumulation, deterministic token parsing).
  - Concurrency: resolve() is invoked during discovery/scan on a single
    thread. The read/verify path holds no shared mutable state.

