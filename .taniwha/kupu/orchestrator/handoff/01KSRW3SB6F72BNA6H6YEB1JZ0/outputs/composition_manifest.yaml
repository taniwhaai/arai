summary: |
  Verification that the three child modules (directive-tokenisation,
  fetch-verification, tier-provenance) are correctly wired through the
  resolve() function in src/extends.rs. The wiring is already complete
  and correct, implementing the exact sequence specified in the
  composition contract:

  Step 1 (Tokenise): extract_directives() calls classify_directive() on
  each directive line from the instruction file.

  Step 2 (Resolve trust entry + obtain content): fetch() looks up the URL
  in the trust file via find_trust_entry() and fetches the content using
  the existing fetch/cache path.

  Step 3 (Verify): fetch() calls verify_content() with the obtained content,
  the pin from ParsedDirective, and the resolved TrustEntry. Both the
  fresh-remote and stale-cache paths run this verification (AC4).

  Step 4 (Tag provenance + inline): resolve() emits a tier-annotated
  block-start comment (<!-- arai:extends-block url="..." tier="..." -->)
  before inlining the upstream content. The tier defaults to "peer" when
  absent (AC1 backward-compat invariant).

  Step 5 (Downstream pipeline): The inlined content passes to parser.rs
  rule extraction. The parser's extract_rules_from_resolved() function
  reads the block-start markers and applies per-block provenance to each
  extracted rule triple.

  No hidden adapters were introduced. The wiring is mechanical and faithful
  to the contracts. All error paths follow the composition contract's
  specification: stderr warnings on failures, no error propagation to
  the caller, per-directive failure isolation.

