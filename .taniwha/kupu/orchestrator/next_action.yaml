      - verifier_report
    context:
      task: |
        Verify the implementation of the legacy-path-migration module against contract v1.

        The leaf-implementation subagent has already run. cargo test passes with 302
        tests (287 pre-existing + 15 new module tests). This has been independently
        verified by the dispatcher.

        Source files written (see manifest for descriptions):
          - src/legacy_path_migration.rs (new; 15 unit tests)
          - src/config.rs (additive: pub deprecation_notice field)
          - src/init.rs (additive: offer_migration call in pub fn run())
          - src/main.rs (additive: mod legacy_path_migration; declaration)

        Read each source file listed in the manifest. Verify the implementation against
        every acceptance criterion in the contract:

          AC1  — ~/.arai/ detection: offer_migration is called when ResolvedBaseDir path
                 matches ~/.arai/ and triggers prompt to user.
          AC2  — Non-TTY: is_interactive returns false → returns SkippedNonInteractive
                 with no prompt emitted.
          AC3  — Input parsing: "y"/"Y" (after stripping \n and \r) → accept;
                 everything else (empty, "yes", " y", "n", "N", read failure) → decline.
          AC4  — Decline persists: .migration_declined marker written; subsequent call
                 with marker present returns PreviouslyDeclined without prompting.
          AC5  — Copy-then-delete (not os::rename); EXDEV (CrossesDevices) handled
                 by falling back to copy-then-delete.
          AC6  — Move failure: partial copy cleaned up; returns MoveFailed with reason.
          AC7  — Destination already exists: returns AlreadyDone without prompting.
          AC8  — No new external crate dependency in Cargo.toml or Cargo.lock.
          AC9  — cargo test exits 0 with 302 tests passing (confirmed by dispatcher;
                 record this as verified from dispatcher attestation in the manifest).
          AC-noninteractive — SkippedNonInteractive returns without printing prompt.
          AC-statsfail      — dir_stats failure does not abort migration; proceeds
                              with MigrationSummaryStats { file_count: 0, total_bytes: 0 }.
          AC-determinism    — No ambient state accessed directly; all I/O via capabilities.

        Produce a verifier_report.yaml at the output_destination path with:
          overall: pass | fail | partial
          per_ac:
            - id: AC1
              verdict: pass | fail | partial
              evidence: "<short phrase citing what in the source code demonstrates this>"
            # ... one entry per AC ...
          notes: "<any additional observations>"

        If overall is fail or partial, list which ACs failed and why. The orchestrator
        will use this report to decide whether to re-dispatch the leaf or mark complete.
