      message: |
        feat: Grok TUI native deny via exit code 2 (#122)

        When `arai guardrails --match-stdin` runs under the Grok TUI
        (detected via GROK_HOOK_EVENT or GROK_SESSION_ID env vars) and
        a Block-severity rule fires on a PreToolUse event, the process
        now exits with code 2 so Grok can natively deny the tool call.

        All other events (PostToolUse, UserPromptSubmit) and all other
        hosts (Claude Code, unknown) continue to exit 0; Claude Code's
        permissionDecision JSON path is unchanged (regression-guarded).

        Adds `desired_exit_code(host, event, deny_outcome) -> i32` pure
        helper and updates `handle_stdin_impl` return type to
        `Result<i32, String>`.  Error paths on PreToolUse under Grok
        are fail-closed (exit 2 + Grok deny JSON).

        AC1–AC7 verified; 340 unit tests + all integration suites pass.
        Verifier integration tests: tests/hooks_grok_exit_verifier.rs.

        Co-Authored-By: Claude Opus 4.8 (1M context) <noreply@anthropic.com>

