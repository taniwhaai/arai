actions:
  - sequence: 1
    action: dispatch_subagent
    role: verifier
    model: claude-sonnet-4-6
    handoff_id: 01KSF5VERIF72VERIFY000001
    inputs:
      - kind: contract
        path: .taniwha/kupu/contracts/legacy-path-migration/v1.md
      - kind: project_context
        path: .taniwha/kupu/project_context.yaml
      - kind: implementation_manifest
        path: .taniwha/kupu/orchestrator/handoff/01KSF5LEAF72IMPLEMENT00001/outputs/manifest.yaml
    output_destination:
      path: .taniwha/kupu/orchestrator/handoff/01KSF5VERIF72VERIFY000001/outputs/
