      PR BODY:
        ## Summary

        Closes #29. Extends `arai:extends` with three hardening features for
        upstream policy ingestion:

        - **@sha256 pin token** — append `@<64-char-hex>` to an `arai:extends`
          directive to require the fetched content to match the given SHA-256.
          Content whose hash differs is rejected and a warning is emitted. Pin
          check runs on both the fresh-remote and stale-cache fallback paths.
        - **ed25519 detached-sidecar signing** — run `arai trust --add <url>
          --pubkey <hex>` to record an ed25519 verifying key for a trusted URL.
          On each fetch a `.sig` sidecar is retrieved and the signature verified
          over the full content bytes before ingestion. Opt-in: no pubkey = no
          check. Legacy trust files (bare URL list) continue to work unchanged.
        - **Tier provenance** — `arai:extends` directives accept a `tier=<value>`
          token (`strict`, `advisory`, `override`). This governs how upstream rules
          compete with local rules at match time: strict rules are always retained,
          advisory rules are deprioritised (score halved) but present, override rules
          implicitly drop any local rule whose subject-predicate-object triple matches
          exactly.

        All three gaps named in issue #29 are closed.

