      title: "feat: Grok TUI native deny via exit code 2 (#122)"
      body: |
        ## Summary

        This is the **exit-code semantics slice** of issue #122 (Grok TUI native hook support).
        The earlier slices — host detection (`detect_host`) and Grok-shaped JSON output
        (`emit_grok_decision`) — were merged on main previously (PR #123 / `feat/grok-tui-support`).
        This PR closes the remaining gap: when a Block-severity rule fires under the Grok TUI,
        the process must exit with code 2 so Grok can act on it natively.

        ### What changed

        **`src/hooks.rs`** (only file modified in production code):
        - New pure helper `desired_exit_code(host: Host, event: &str, deny_outcome: bool) -> i32`.
          Returns `2` iff host is Grok, event is `PreToolUse`, and `deny_outcome` is true;
          returns `0` for every other combination.
        - `handle_stdin_impl` return type changed from `Result<(), String>` to `Result<i32, String>`;
          all early-exit `Ok(())` paths become `Ok(0)`; the emit site returns
          `Ok(desired_exit_code(host, &result.event, blocking))`.
        - `handle_stdin` updated to call `std::process::exit(code)` when `code == 2`
          (Grok PreToolUse deny), and return normally (`Ok(())`) otherwise.
        - Error paths on `PreToolUse` under Grok are **fail-closed**: emit Grok-shaped deny JSON
          + exit 2. Error paths under Claude/Unknown are unchanged (exit 0).

        **`tests/hooks_grok_exit_verifier.rs`** (new — verifier-authored subprocess integration tests):
        9 tests covering every truth-table cell via `Command::new(env!("CARGO_BIN_EXE_arai"))`.

        ### Acceptance criteria (all pass)

        | AC | Criterion | Status |
        |----|-----------|--------|
        | AC1 | Grok + PreToolUse + Block → exit 2, Grok deny JSON | pass |
        | AC2 | Grok + PreToolUse + allow → exit 0 | pass |
        | AC3 | Claude + PreToolUse + Block → exit 0, Claude deny JSON (regression guard) | pass |
        | AC4 | Internal error on PreToolUse under Grok → exit 2, Grok deny (fail-closed) | pass |
        | AC5 | Internal error under Claude → exit 0, Claude deny | pass |
        | AC6 | PostToolUse or UserPromptSubmit under Grok → exit 0 always | pass |
        | AC7 | 340 unit tests + all integration suites pass, 0 regressions | pass |

