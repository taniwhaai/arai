    pr_body: |
      ## Summary

      Adds gateway-derived outcome glyphs to Arai's human-readable output surfaces,
      replacing generic warning/blocked icons with a coherent visual vocabulary that
      mirrors the gateway metaphor.

      ### Glyph set

      | Outcome | Unicode | ASCII fallback |
      |---------|---------|----------------|
      | Blocked | `●·│✕` | `o.\|x` |
      | Allowed | `│●│` | `\|o\|` |
      | Warned (Warn + Inform) | `●·│` | `o.\|` |

      Visual weight matches severity: blocked is heaviest (4 chars + cross), warned is
      medium (dot adjacent, no cross), allowed is lightest (dot passing through).

      ### Unicode detection (`should_use_unicode`)

      Precedence chain: `ARAI_ASCII` (non-empty) → ASCII; `NO_UNICODE` (non-empty) →
      ASCII; locale priority `LC_ALL > LC_CTYPE > LANG` (first non-empty, UTF-8 check);
      missing/empty locale vars → ASCII. Deliberately TTY-independent — no `isatty`
      call, so piped output honours the same locale as interactive output.

      ### Palette reuse from #83

      The ochre cross (`✕`, `passage("\u{2715}", true)`) reuses `#83`'s `passage()`
      helper and the `should_colorize()` gate. Colour only appears on the blocked
      glyph, and only when `colorize=true`. All other glyph characters carry no colour.

      ### Carve-outs

      - **Hook output** (`src/hooks.rs`): all `outcome_glyph` calls pass literal `false`
        for the `colorize` argument — glyph characters appear in Pre/Post human strings
        but zero ANSI escape bytes are emitted, even under `CLICOLOR_FORCE=1`.
      - **`--json` output**: no `outcome_glyph` call exists on any JSON code path
        (`cmd_audit`, `cmd_why`, `stats::run()`). The carve-out is structural, not a
        conditional — glyph-free by design.
      - **Audit-chain `✓`/`✗` integrity markers** in `src/main.rs` are left untouched
        (different semantic — hash-chain verification, not outcome display).

      ### Integration surfaces

      - `src/main.rs`: `cmd_audit` and `cmd_why` human-output paths prefix each row
        with `outcome_glyph(outcome, unicode, col)`.
      - `src/stats.rs`: `print_compliance_section` replaces the generic `⚠` literal
        with `outcome_glyph(Outcome::Warn, unicode, col)`.
      - `src/hooks.rs`: Pre/Post human strings prefixed with glyphs; `colorize` is
        hard-coded to `false` (zero ANSI guarantee).

      ### Zero new dependencies

      `src/style.rs` is extended in-place. `Cargo.toml` and `Cargo.lock` are
      unchanged.

