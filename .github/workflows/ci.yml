name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
      - run: cargo clippy -- -D warnings

  test-enrich:
    name: Test (with enrich)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --features enrich

  # Cloudflare Pages serves arai.taniwha.ai/install from site/install, which
  # is a copy of the canonical install.sh at the repo root.  Catch drift
  # before it ships an outdated installer to every `curl | sh` user.
  install-script-sync:
    name: install.sh sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: site/install matches install.sh
        run: |
          if ! diff -q install.sh site/install; then
            echo "::error::site/install is out of sync with install.sh."
            echo "::error::Run \`cp install.sh site/install\` and commit."
            exit 1
          fi

  # After tests pass on main: create release PR + tag/publish on merge
  release-plz:
    name: Release-plz
    needs: [test, test-enrich]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Release PR
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Build binaries on version tags
  build:
    name: Build (${{ matrix.platform }})
    needs: [test, test-enrich]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-aarch64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build lean binary
        shell: bash
        run: |
          BUILD_CMD="cargo"
          if [ "${{ matrix.cross }}" = "true" ]; then BUILD_CMD="cross"; fi
          $BUILD_CMD build --release --target ${{ matrix.target }}

      - name: Stage lean binary
        shell: bash
        run: |
          mkdir -p staged
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/arai.exe staged/arai-${{ matrix.platform }}.exe
          else
            cp target/${{ matrix.target }}/release/arai staged/arai-${{ matrix.platform }}
            chmod +x staged/arai-${{ matrix.platform }}
          fi

      - name: Build full binary
        continue-on-error: true
        shell: bash
        run: |
          BUILD_CMD="cargo"
          if [ "${{ matrix.cross }}" = "true" ]; then BUILD_CMD="cross"; fi
          $BUILD_CMD build --release --target ${{ matrix.target }} --features enrich

      - name: Stage full binary
        continue-on-error: true
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            if [ -f target/${{ matrix.target }}/release/arai.exe ]; then
              cp target/${{ matrix.target }}/release/arai.exe staged/arai-full-${{ matrix.platform }}.exe
            fi
          else
            if [ -f target/${{ matrix.target }}/release/arai ]; then
              cp target/${{ matrix.target }}/release/arai staged/arai-full-${{ matrix.platform }}
              chmod +x staged/arai-full-${{ matrix.platform }}
            fi
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.platform }}
          path: staged/

  attach-binaries:
    name: Attach binaries to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # id-token: write is required for cosign keyless signing via the
    # GitHub OIDC token.  contents: write must be repeated because a
    # job-level permissions block replaces (not merges with) the
    # workflow-level one, and gh release upload needs it.
    permissions:
      contents: write
      id-token: write
    outputs:
      # Base64-encoded `sha256sum`-style lines, one per `arai-*` binary,
      # consumed by the slsa-provenance job below.  The SLSA generator
      # expects the format `<sha256>  <filename>\n...` then base64'd.
      hashes: ${{ steps.compute-hashes.outputs.hashes }}
    steps:
      - uses: actions/checkout@v6

      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          # Scope to the per-platform binary artifacts only. Other jobs in
          # the run upload unrelated artifacts (e.g. the container job's
          # `.dockerbuild` build record); pulling those in broke the merge.
          pattern: binaries-*
          path: binaries
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd binaries
          # Hash only release binaries — globbing `*` would race with the
          # redirect target and self-include checksums.txt with the empty
          # hash.  Restricting to `arai-*` keeps the manifest deterministic.
          sha256sum arai-* > checksums.txt
          cat checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign binaries with cosign (keyless)
        run: |
          cd binaries
          # cosign keyless signing via the GitHub OIDC token.  No long-
          # lived keys: the signing certificate is issued by Fulcio and
          # bound to the workflow identity, so verifiers can pin to this
          # workflow + tag without trusting a private key.  The bundle
          # file (.cosign.bundle) carries both the signature and the
          # certificate so verifiers only need one extra download.
          for file in arai-*; do
            echo "Signing $file..."
            cosign sign-blob \
              --yes \
              --bundle "${file}.cosign.bundle" \
              "$file"
          done

      - name: Compute hashes for SLSA provenance
        id: compute-hashes
        run: |
          # The SLSA reusable workflow expects `base64-subjects`: a
          # base64-encoded blob of `<sha256>  <filename>\n` lines.  We
          # already have that exact shape in checksums.txt — just b64 it.
          cd binaries
          {
            echo "hashes=$(base64 -w0 < checksums.txt)"
          } >> "$GITHUB_OUTPUT"

      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          for file in binaries/*; do
            echo "Uploading $(basename $file)..."
            gh release upload "$TAG" "$file" --clobber
          done

  # SLSA Level 3 provenance attestation via the slsa-github-generator
  # reusable workflow.  Builds a verifiable record of *how* each binary
  # was built (commit, workflow, inputs, toolchain) so verifiers can
  # answer "was this binary produced by this exact CI pipeline" — the
  # provenance question cosign doesn't answer on its own.
  #
  # The generator emits a single `<tag>.intoto.jsonl` attestation
  # covering every subject in `base64-subjects` and (with
  # upload-assets: true) attaches it to the release.  Verify
  # consumer-side with `slsa-verifier verify-artifact`.
  slsa-provenance:
    needs: attach-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      actions: read      # generator reads the workflow run for provenance
      id-token: write    # OIDC keyless signing (same trust model as cosign)
      contents: write    # attach the attestation to the release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.attach-binaries.outputs.hashes }}
      upload-assets: true

  npm-publish:
    name: Publish to npm
    needs: attach-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version from tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          cd npm
          node -e "const p=require('./package.json'); p.version='$TAG'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Publish
        run: cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Mirror the same npm wrapper to GitHub Packages so the repo's
  # "Packages" sidebar resolves to a first-party artifact.  The @taniwhaai
  # scope matches the org, so GitHub Packages accepts it and auto-links the
  # package to this repo (via package.json's repository field).  Uses the
  # built-in GITHUB_TOKEN — no extra secret — and runs only after binaries
  # are attached, since the wrapper's postinstall fetches them from the
  # release.  Separate runner from npm-publish, so the npmjs publish is
  # unaffected by the GitHub Packages registry config.
  github-packages-publish:
    name: Publish to GitHub Packages
    needs: attach-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Job-level permissions REPLACE the workflow-level block, so contents:read
    # (for checkout) must be restated alongside packages:write.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@taniwhaai'

      - name: Sync version from tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          cd npm
          node -e "const p=require('./package.json'); p.version='$TAG'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Publish
        run: cd npm && npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build the repo's existing Dockerfile (MCP-server image, built from source)
  # and push it to ghcr.io. The image's org.opencontainers.image.source label
  # links the package to this repo, so it surfaces in the Packages sidebar
  # alongside the npm artifact. Built from source rather than the prebuilt
  # binary, so it has no dependency on the binary-attach job; gated on tests
  # like the binary build. linux/amd64 only — an emulated arm64 Rust compile
  # would dominate the release wall-clock; add a native arm64 runner later.
  container-publish:
    name: Publish container to ghcr.io
    needs: [test, test-enrich]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Job-level permissions REPLACE the workflow-level block.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        # Suppress the `.dockerbuild` build-record artifact this action
        # uploads by default — nothing consumes it, and an unfiltered
        # download-artifact elsewhere in the run trips over it.
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/taniwhaai/arai:${{ steps.ver.outputs.version }}
            ghcr.io/taniwhaai/arai:latest
